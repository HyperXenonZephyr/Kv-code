# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference#package-ecosystem-

version: 2
updates:
  - package-ecosystem: bun
    directory: .github/actions/codex
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: cargo
    directories:
      - kv-code-rs
      - kv-code-rs/*
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: docker
    directory: kv-code-cli
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: rust-toolchain
    directory: kv-code-rs
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
